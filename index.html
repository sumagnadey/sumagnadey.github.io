    <!-- Theme Check to Prevent Flash -->
    <script>
      (function() {
        var savedTheme = localStorage.getItem('portfolio-theme');
        if (savedTheme === 'dark') {
          document.body.classList.add('dark-mode');
        } else if (savedTheme === 'light') {
          document.body.classList.remove('dark-mode');
        } else {
          if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.body.classList.add('dark-mode');
          } else {
            var hours = new Date().getHours();
            if (hours < 5 || hours >= 18) {
              document.body.classList.add('dark-mode');
            }
          }
        }
      })();
    </script>
    <div id="root">
      <style>
        .initial-loader-wrapper {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #f0f2f5;
          z-index: 99999;
          font-family: 'JetBrains Mono', monospace;
          transition: background-color 0.3s ease;
        }

        body.dark-mode .initial-loader-wrapper {
          background-color: #06060f;
        }

        .quantum-cell-svg {
          width: 100px;
          height: 100px;
          margin-bottom: 24px;

        .nucleus-core {
          fill: #4f46e5;
          animation: pulse-core 2s infinite ease-in-out;
        }
        body.dark-mode .nucleus-core { fill: #818cf8; }

        .electron-1 { fill: #06b6d4; }
        body.dark-mode .electron-1 { fill: #22d3ee; }

        .electron-2 { fill: #7c3aed; }
        body.dark-mode .electron-2 { fill: #c084fc; }

        .electron-3 { fill: #10b981; }
        body.dark-mode .electron-3 { fill: #34d399; }

        .loader-text {
          font-size: 0.85rem;
          font-weight: 600;
          letter-spacing: 0.25em;
          color: #1a1a2e;
          text-transform: uppercase;
          animation: pulse-text 2s ease-in-out infinite;
        }

        body.dark-mode .loader-text {
          color: #e8e8f8;
        }

        @keyframes pulse-core {
          0%, 100% { transform: scale(1); opacity: 1; transform-origin: 50px 50px; }
          50% { transform: scale(1.3); opacity: 0.8; transform-origin: 50px 50px; }
        }

        @keyframes pulse-text {
          0%, 100% { opacity: 1; }

        }
