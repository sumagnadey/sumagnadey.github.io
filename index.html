    <!-- Theme Flash Prevention — synced with React's period-aware logic -->
    <script>
      (function() {
        var hours = new Date().getHours();
        var currentPeriod = (hours < 6 || hours >= 18) ? 'night' : 'day';
        var isDark = currentPeriod === 'night';

        // Check for user's manual override (only valid if same time period)
        try {
          var saved = localStorage.getItem('portfolio-theme-pref');
          if (saved) {
            var pref = JSON.parse(saved);
            if (pref.period === currentPeriod) {
              isDark = pref.theme === 'dark';
            } else {
              localStorage.removeItem('portfolio-theme-pref');
            }
          }
        } catch(e) { localStorage.removeItem('portfolio-theme-pref'); }

        // Also clean up legacy key from old versions
        localStorage.removeItem('portfolio-theme');

        if (isDark) {
          document.body.classList.add('dark-mode');
        }
      })();
    </script>
