<body>
  <!-- Theme Initialization -->
  <script>
    (function () {
      // Suppress all CSS transitions until React settles the theme
      document.body.classList.add('theme-resolving');

      var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

      // Check for user's manual override
      try {
        var saved = localStorage.getItem('portfolio-theme-pref');
        if (saved) {
          var pref = JSON.parse(saved);
          isDark = pref.theme === 'dark';
        }
      } catch (e) { localStorage.removeItem('portfolio-theme-pref'); }

      // Clean up legacy key from old versions
      localStorage.removeItem('portfolio-theme');

      if (isDark) {
        document.body.classList.add('dark-mode');
        document.body.style.backgroundColor = '#030014';
      } else {
        document.body.style.backgroundColor = '#fafafe';
      }
    })();
  </script>
  <style>
    .initial-loader-wrapper {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      pointer-events: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    /* Subtle grid background for the curtain */
    .loader-panel-top,
    .loader-panel-bottom {
      height: 50vh;
      width: 100vw;
      background-color: #fafafe;
      position: relative;
      transition: transform 1.2s cubic-bezier(0.76, 0, 0.24, 1) 0.2s;
      will-change: transform;
      overflow: hidden;
      background-image: 
        linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    body.dark-mode .loader-panel-top,
    body.dark-mode .loader-panel-bottom {
      background-color: #030014;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    }

    /* The Text container inside both panels */
    .loader-text-wrapper {
      position: absolute;
      left: 0;
      width: 100%;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Position the top text so its bottom half is cut off */
    .loader-panel-top .loader-text-wrapper {
      bottom: 0;
      transform: translateY(50%);
    }

    /* Position the bottom text so its top half is cut off */
    .loader-panel-bottom .loader-text-wrapper {
      top: 0;
      transform: translateY(-50%);
    }

    .loader-text {
      font-size: clamp(3rem, 8vw, 8rem);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: #111;
      margin: 0;
      line-height: 1;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeInText 1s ease 0.3s forwards;
    }

    body.dark-mode .loader-text {
      color: #fff;
    }

    @keyframes fadeInText {
      from { opacity: 0; filter: blur(10px); }
      to { opacity: 1; filter: blur(0); }
    }

    /* The glowing line */
    .loader-line-container {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-line {
      height: 100%;
      width: 0%;
      background: #7C3AED;
      box-shadow: 0 0 15px #7C3AED, 0 0 30px #7C3AED;
      transition: width 1.5s cubic-bezier(0.76, 0, 0.24, 1) 0.5s, opacity 0.3s ease;
    }

    body.dark-mode .loader-line {
      background: #06B6D4;
      box-shadow: 0 0 15px #06B6D4, 0 0 30px #06B6D4;
    }

    /* The Reveal Animation */
    .initial-loader-wrapper.loader-finished .loader-line {
      opacity: 0;
      width: 100%;
    }

    .initial-loader-wrapper.loader-finished .loader-panel-top {
      transform: translateY(-100%);
    }

    .initial-loader-wrapper.loader-finished .loader-panel-bottom {
      transform: translateY(100%);
    }
  </style>

  <div id="global-loader" class="initial-loader-wrapper">
    <!-- Top Curtain -->
    <div class="loader-panel-top">

    <!-- The Cut Line -->
    <div class="loader-line-container">

    </div>
    
    <!-- Bottom Curtain -->
    <div class="loader-panel-bottom">
      <div class="loader-text-wrapper">

      </div>
    </div>
  </div>

  <script>
    (function() {
      // Start the line expansion animation
      setTimeout(() => {
        const line = document.getElementById('loader-line');
        if (line) {
          line.style.width = '100%';
        }
      }, 50);
    })();
  </script>
