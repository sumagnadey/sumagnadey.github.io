    <!-- Theme Initialization -->
    <script>
      (function() {
        // Suppress all CSS transitions until React settles the theme
        document.body.classList.add('theme-resolving');

        var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        // Check for user's manual override
        try {
          var saved = localStorage.getItem('portfolio-theme-pref');
          if (saved) {
            var pref = JSON.parse(saved);
            isDark = pref.theme === 'dark';
          }
        } catch(e) { localStorage.removeItem('portfolio-theme-pref'); }

        // Clean up legacy key from old versions
        localStorage.removeItem('portfolio-theme');

        if (isDark) {
          document.body.classList.add('dark-mode');
          document.body.style.backgroundColor = '#030014';
        } else {
          document.body.style.backgroundColor = '#fafafe';
        }
      })();
    </script>
    <style>
        .initial-loader-wrapper {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background-color: #fafafe;
          z-index: 99999;
          font-family: 'JetBrains Mono', monospace;
          overflow: hidden;
        }

        body.dark-mode .initial-loader-wrapper {
          background-color: #030014;
        }

        /* Quantum boot sequence */
        .loader-quantum-ring {
          width: 120px;
          height: 120px;
          position: relative;
          margin-bottom: 32px;
        }

        .loader-ring {
          position: absolute;
          inset: 0;
          border-radius: 50%;
          border: 2px solid transparent;
          animation: loader-spin 2s linear infinite;
        }

        .loader-ring:nth-child(1) {
          border-top-color: #7C3AED;
          animation-duration: 1.8s;
        }
        .loader-ring:nth-child(2) {
          inset: 8px;
          border-right-color: #06B6D4;
          animation-duration: 2.2s;
          animation-direction: reverse;
        }
        .loader-ring:nth-child(3) {
          inset: 16px;
          border-bottom-color: #A78BFA;
          animation-duration: 1.5s;
        }

        .loader-core {
          position: absolute;
          top: 50%;
          left: 50%;
          width: 16px;
          height: 16px;
          margin: -8px 0 0 -8px;
          border-radius: 50%;
          background: linear-gradient(135deg, #7C3AED, #06B6D4);
          animation: loader-pulse 1.5s ease-in-out infinite;
          box-shadow: 0 0 20px rgba(124, 58, 237, 0.5), 0 0 40px rgba(6, 182, 212, 0.3);
        }

        body.dark-mode .loader-core {
          box-shadow: 0 0 30px rgba(124, 58, 237, 0.6), 0 0 60px rgba(6, 182, 212, 0.4);
        }

        .loader-text {
          font-size: 0.75rem;
          font-weight: 600;
          letter-spacing: 0.35em;
          color: #1a1a2e;
          text-transform: uppercase;
          opacity: 0;
          animation: loader-text-in 0.5s ease forwards 0.3s;
        }

        body.dark-mode .loader-text {
          color: #a78bfa;
        }

        .loader-progress {
          width: 160px;
          height: 2px;
          background: rgba(124, 58, 237, 0.15);
          border-radius: 2px;
          margin-top: 16px;
          overflow: hidden;
        }

        .loader-progress-bar {
          height: 100%;
          background: linear-gradient(90deg, #7C3AED, #06B6D4);
          border-radius: 2px;
          animation: loader-progress 2s ease-in-out infinite;
        }

        @keyframes loader-spin {
          to { transform: rotate(360deg); }
        }

        @keyframes loader-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.4); opacity: 0.7; }
        }

        @keyframes loader-text-in {
          to { opacity: 1; }
        }

        @keyframes loader-progress {
          0% { width: 0%; margin-left: 0; }
          50% { width: 80%; margin-left: 10%; }
          100% { width: 0%; margin-left: 100%; }
        }
